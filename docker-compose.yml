services:
  postgres_default:
    image: postgres:16-alpine
    container_name: autoimovel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoimovel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autoimovel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/AutoImovel.API/Dockerfile
    container_name: autoimovel-api
    depends_on:
      postgres_default:
        condition: service_healthy
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres_default;Port=5432;Database=autoimovel;Username=postgres;Password=postgres
    networks:
      - autoimovel-network
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: src/AutoImovel.Admin/Dockerfile
    container_name: autoimovel-admin
    ports:
      - "5001:80"
    networks:
      - autoimovel-network
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: src/AutoImovel.Dashboard/Dockerfile
    container_name: autoimovel-dashboard
    ports:
      - "5002:80"
    networks:
      - autoimovel-network
    restart: unless-stopped

networks:
  autoimovel-network:

volumes:
  postgres_data:
